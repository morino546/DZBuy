<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الفئات | DZBuy</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:Cairo,sans-serif;background:#f3f6fd;color:#101827}
    .wrap{width:min(1000px,92%);margin:28px auto}
    h1{margin:0 0 18px}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
    .card{background:#fff;border:1px solid #dce6fb;border-radius:12px;padding:14px}
    a{color:#0a66ff;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="wrap">
    <h1 id="all">الفئات</h1>
    <div class="grid">
      <div class="card" id="men-shoes">أحذية كاجوال للرجال</div>
      <div class="card" id="women-shoes">أحذية النساء</div>
      <div class="card" id="home-decor">ديكور المنزل</div>
      <div class="card" id="kitchen">المطبخ والمنزل</div>
      <div class="card" id="bags">الحقائب والإكسسوارات</div>
      <div class="card" id="beauty">الجمال والصحة</div>
      <div class="card" id="home-kitchen">البيت والمطبخ</div>
      <div class="card" id="women-clothes">ملابس نسائية</div>
      <div class="card" id="men-clothes">ملابس رجالية</div>
      <div class="card" id="jewelry">المجوهرات والاكسسوارات</div>
      <div class="card" id="toys">الدمى والألعاب</div>
    </div>
    <p style="margin-top:16px"><a href="index.html">العودة للرئيسية</a></p>
  </div>
</body>
</html>
